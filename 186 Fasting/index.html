<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>168 Fasting · 一六八</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  html, body {
    margin: 0; padding: 0; min-height: 100vh;
    background:
      radial-gradient(ellipse at 50% 20%, #2a2a28 0%, #15140f 60%, #0a0907 100%);
    font-family: "Noto Serif SC", serif;
    overflow-x: hidden;
  }
  * { box-sizing: border-box; }
  button { font-family: inherit; }
  @keyframes ringPulse {
    0%, 100% { opacity: 0.4; transform: scale(1); }
    50%      { opacity: 1;   transform: scale(1.06); }
  }
  @keyframes slideDown {
    from { transform: translateY(-20px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }
  @keyframes fadeIn {
    from { opacity: 0; } to { opacity: 1; }
  }
  /* Tweaks panel */
  .tweaks {
    position: fixed; bottom: 20px; right: 20px; z-index: 100;
    background: rgba(20, 18, 14, 0.92);
    backdrop-filter: blur(12px);
    border: 0.5px solid rgba(216, 205, 181, 0.3);
    padding: 16px;
    color: #D8CDB5;
    font-family: "Noto Serif SC", serif;
    font-size: 12px;
    letter-spacing: 2px;
    min-width: 200px;
    display: none;
  }
  .tweaks.on { display: block; animation: fadeIn 0.3s; }
  .tweaks .row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 0;
  }
  .tweaks button {
    background: transparent;
    border: 0.5px solid rgba(216,205,181,0.3);
    color: #D8CDB5;
    padding: 4px 8px;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
    margin-left: 4px;
  }
  .tweaks button.active {
    background: #556B44; color: #F5EFE3; border-color: #556B44;
  }
  .tweaks h4 {
    margin: 0 0 6px; font-size: 11px; font-weight: 400;
    letter-spacing: 4px; color: #A89F8F;
    border-bottom: 0.5px solid rgba(216,205,181,0.15);
    padding-bottom: 6px;
  }
</style>
</head>
<body>
<div style="position:fixed;top:20px;right:20px;z-index:99;display:flex;background:rgba(20,18,14,0.85);border:0.5px solid rgba(216,205,181,0.25);backdrop-filter:blur(8px);">
  <a href="index.html" style="padding:8px 14px;font-family:'Noto Serif SC',serif;font-size:11px;letter-spacing:3px;color:#F5EFE3;background:rgba(85,107,68,0.4);text-decoration:none;">中 文</a>
  <a href="index-en.html" style="padding:8px 14px;font-family:'Inter',sans-serif;font-size:10px;letter-spacing:2px;color:#A89F8F;text-decoration:none;font-weight:500;">EN</a>
</div>
<div id="root" style="display:flex;justify-content:center;align-items:flex-start;padding:40px 0 60px;min-height:100vh;"></div>

<div class="tweaks" id="tweaks">
  <h4>状 态</h4>
  <div id="stateBtns"></div>
  <h4 style="margin-top:12px">页 面</h4>
  <div id="pageBtns"></div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="app/tokens.jsx"></script>
<script type="text/babel" src="app/Ring.jsx"></script>
<script type="text/babel" src="app/WeekCal.jsx"></script>
<script type="text/babel" src="app/ReminderToast.jsx"></script>
<script type="text/babel" src="app/HomeScreen.jsx"></script>
<script type="text/babel" src="app/CalendarScreen.jsx"></script>
<script type="text/babel" src="app/AchievementScreen.jsx"></script>
<script type="text/babel" src="app/TabBar.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

// Map state -> (mins remaining, totalMins, autoPulse)
//   eating: 480m (8h) -> progress increases over time
//   warn1:  60m remaining
//   warn2:  30m
//   warn3:  15m
//   fasting: 16h countdown (showing elapsed)
const STATE_CONFIG = {
  idle:    { mins: 0,   total: 480 },
  eating:  { mins: 420, total: 480 },  // 剩 7h
  warn1:   { mins: 60,  total: 480 },  // 剩 1h
  warn2:   { mins: 30,  total: 480 },
  warn3:   { mins: 15,  total: 480 },
  fasting: { mins: 540, total: 960 },  // 断食 16h, 剩 9h
  closed:  { mins: 0,   total: 480 },
};

const WEEK = [
  { day: '日', date: 13, pct: 1,   past: true },
  { day: '一', date: 14, pct: 0.9, past: true },
  { day: '二', date: 15, pct: 0.6, isToday: true },
  { day: '三', date: 16, future: true },
  { day: '四', date: 17, future: true },
  { day: '五', date: 18, future: true },
  { day: '六', date: 19, future: true },
];

// Generate month data — April 2026, 30 days, April 1 = Wednesday
const MONTH_DATA = (() => {
  const data = [];
  // April 1, 2026 is a Wednesday -> day-of-week index 3 (Sun=0)
  const startOffset = 3;
  for (let i = 0; i < startOffset; i++) data.push(null);
  const today = 15;
  for (let d = 1; d <= 30; d++) {
    if (d < today) {
      const pct = 0.6 + Math.random() * 0.5;
      data.push({ date: d, pct: Math.min(1, pct) });
    } else if (d === today) {
      data.push({ date: d, pct: 0.6, isToday: true });
    } else {
      data.push({ date: d, pct: 0, future: true });
    }
  }
  return data;
})();

function App() {
  const [state, setState] = useState('eating');
  const [page, setPage] = useState('home');
  const [showToast, setShowToast] = useState(true);
  const [tick, setTick] = useState(0);

  // Re-show toast when entering a warn state
  useEffect(() => {
    if (['warn1','warn2','warn3','closed'].includes(state)) setShowToast(true);
    else setShowToast(false);
  }, [state]);

  // Live ticking seconds for ring timer
  useEffect(() => {
    const id = setInterval(() => setTick(t => t + 1), 1000);
    return () => clearInterval(id);
  }, []);

  const cfg = STATE_CONFIG[state];
  // Subtract elapsed seconds (capped to 59 to keep demo display moving)
  const liveMins = Math.max(0, cfg.mins - (tick % 60) / 60);

  // Tweaks wiring
  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') document.getElementById('tweaks').classList.add('on');
      if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks').classList.remove('on');
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  useEffect(() => {
    const states = [
      ['idle', '未 始'],
      ['eating', '进 食'],
      ['warn1', '一 时'],
      ['warn2', '半 时'],
      ['warn3', '一 刻'],
      ['fasting', '断 食'],
      ['closed', '窗 合'],
    ];
    const pages = [
      ['calendar', '日 历'],
      ['home', '今 日'],
      ['ach', '成 就'],
    ];
    const sb = document.getElementById('stateBtns');
    const pb = document.getElementById('pageBtns');
    sb.innerHTML = ''; pb.innerHTML = '';
    states.forEach(([k,l]) => {
      const b = document.createElement('button');
      b.textContent = l;
      if (k === state) b.classList.add('active');
      b.onclick = () => setState(k);
      sb.appendChild(b);
    });
    pages.forEach(([k,l]) => {
      const b = document.createElement('button');
      b.textContent = l;
      if (k === page) b.classList.add('active');
      b.onclick = () => setPage(k);
      pb.appendChild(b);
    });
  }, [state, page]);

  const screen = (() => {
    if (page === 'calendar') return <CalendarScreen monthData={MONTH_DATA} />;
    if (page === 'ach') return <AchievementScreen />;
    return <HomeScreen state={state} setState={setState} mins={liveMins} totalMins={cfg.total} weekData={WEEK} />;
  })();

  return (
    <IOSDevice dark={false} width={390} height={844}>
      <div data-screen-label={page === 'home' ? '01 今日' : page === 'calendar' ? '02 日历' : '03 成就'}
           style={{ height: '100%', position: 'relative' }}>
        {screen}
        {page === 'home' && showToast && (
          <ReminderToast state={state} onDismiss={() => setShowToast(false)} />
        )}
        <TabBar current={page} onChange={setPage} />
      </div>
    </IOSDevice>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
